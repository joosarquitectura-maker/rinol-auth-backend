<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RINOL v17 - Aprobación Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .safe-area { padding-top: max(env(safe-area-inset-top), 8px); }
        .container-mobile {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: #030303;
        }
        .header { 
            flex-shrink: 0;
            padding: 12px;
            border-bottom: 1px solid #27272a;
            background: #09090b;
        }
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .footer {
            flex-shrink: 0;
            padding: 12px;
            border-top: 1px solid #27272a;
            background: #09090b;
        }
        .panel {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 12px;
        }
        .button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .button-green {
            background: linear-gradient(135deg, #16a34a, #059669);
            color: white;
        }
        .button-green:active { opacity: 0.8; }
        .button-green:disabled { opacity: 0.5; }
        .button-blue {
            background: linear-gradient(135deg, #2563eb, #0891b2);
            color: white;
        }
        .button-blue:active { opacity: 0.8; }
        .button-file {
            background: #3b82f6;
            color: white;
            padding: 8px 12px;
            font-size: 12px;
        }
        .data-row {
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #27272a;
        }
        .data-row:last-child { border-bottom: none; }
        .label { 
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            color: #71717a;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .value {
            font-size: 14px;
            color: #f4f4f5;
            font-weight: 500;
        }
        .value-large {
            font-size: 20px;
            color: #60a5fa;
            font-weight: bold;
        }
        .status {
            display: inline-block;
            padding: 4px 8px;
            background: #ea580c;
            color: white;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
        .session-badge {
            display: inline-block;
            padding: 6px 10px;
            background: #27272a;
            border: 1px solid #3f3f46;
            border-radius: 6px;
            font-size: 11px;
            color: #a1a1aa;
            margin-top: 4px;
        }
        .table-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px;
            background: #27272a;
            border-radius: 6px;
            margin-bottom: 4px;
            font-size: 11px;
        }
        .table-cell {
            flex: 1;
            min-width: 60px;
        }
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-backdrop.active {
            display: flex;
        }
        .modal {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 20px;
            max-width: 90%;
            max-height: 80%;
            overflow-y: auto;
            color: #f4f4f5;
        }
        .modal-title {
            font-size: 16px;
            font-weight: bold;
            color: #60a5fa;
            margin-bottom: 12px;
        }
        .modal-text {
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .modal-buttons {
            display: flex;
            gap: 8px;
        }
        .modal-button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }
        .modal-button-primary {
            background: #3b82f6;
            color: white;
        }
    </style>
</head>
<body class="safe-area">
    <div class="container-mobile">
        <!-- HEADER -->
        <div class="header">
            <h1 style="margin: 0; font-size: 16px; font-weight: bold; color: white;">COMPRAS COLOMBIA</h1>
            <p style="margin: 4px 0 0 0; font-size: 9px; color: #3b82f6; font-weight: bold; letter-spacing: 0.3em;">v17.0 | APROBACIÓN FINAL</p>
            <div style="margin-top: 8px;">
                <input type="file" id="pdfInput" accept=".pdf" class="button button-file"/>
                <div id="sesionIndicador" class="session-badge" style="display: none;">
                    ✅ Listo para enviar
                </div>
            </div>
        </div>

        <!-- CONTENIDO PRINCIPAL -->
        <div class="content">
            <!-- PANEL: DATOS DE LA ORDEN -->
            <div class="panel">
                <div style="font-size: 10px; font-weight: bold; color: #60a5fa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">
                    📋 DATOS DE LA ORDEN
                </div>
                <div id="panelIzquierdo">
                    <div class="label">Esperando archivo PDF...</div>
                </div>
            </div>

            <!-- PANEL: MATERIALES -->
            <div class="panel">
                <div style="font-size: 10px; font-weight: bold; color: #f59e0b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">
                    📦 MATERIALES
                </div>
                <div id="panelMateriales" style="font-size: 11px; color: #a1a1aa;">
                    <div class="label">Cargando...</div>
                </div>
            </div>

            <!-- PANEL: TOTALES -->
            <div class="panel">
                <div style="font-size: 10px; font-weight: bold; color: #10b981; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">
                    💰 TOTALES
                </div>
                <div id="panelTotales">
                    <div class="label">Cargando...</div>
                </div>
            </div>
        </div>

        <!-- FOOTER: BOTONES DE ACCIÓN -->
        <div class="footer">
            <div id="seccionAcciones" style="display: none;">
                <button onclick="enviarAprobacion()" class="button button-green" style="margin-bottom: 8px;">
                    ✓ ENVIAR A OPERACIONES
                </button>
                <button onclick="enviarFinanzas()" class="button button-blue" style="margin-bottom: 8px;">
                    📊 ENVIAR A FINANZAS
                </button>
                <div id="estadoEnvio" class="panel" style="display: none; font-size: 12px; font-weight: bold; text-align: center; margin-top: 8px;"></div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modal" class="modal-backdrop">
        <div class="modal">
            <div class="modal-title" id="modalTitle">Información</div>
            <div class="modal-text" id="modalText"></div>
            <div class="modal-buttons">
                <button class="modal-button modal-button-primary" onclick="cerrarModal()">Entendido</button>
            </div>
        </div>
    </div>

    <script>
        // ── CONFIGURACIÓN ──────────────────────────────────────────────────
        const CLIENT_ID = "4ccb3c0e-439f-4571-a53f-b31b5138e50f";
        const TENANT_ID = "8abf00f8-2a9e-4312-b0d4-5f51b1230a96"; // Tu Tenant ID específico
        const SP_HOSTNAME  = "rcrind.sharepoint.com";
        const SP_SITE_PATH = "/sites/ComprasColombia";
        const EXCEL_PATH   = "/Documentos compartidos/Registro_OC_Aprobadas.xlsx";
        const EXCEL_TABLE  = "Registro_OC_Aprobadas";

        // ── PDF.js ────────────────────────────────────────────────────────
        const pdfjs = window['pdfjs-dist/build/pdf'];
        pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // ── ESTADO GLOBAL ──────────────────────────────────────────────────
        let dataExtraida = null;
        let accessToken = null;

        // ── MODAL ──────────────────────────────────────────────────────────
        function mostrarModal(titulo, mensaje) {
            document.getElementById("modalTitle").textContent = titulo;
            document.getElementById("modalText").textContent = mensaje;
            document.getElementById("modal").classList.add("active");
        }

        function cerrarModal() {
            document.getElementById("modal").classList.remove("active");
        }

        // ── HELPERS ────────────────────────────────────────────────────────
        const limpiar = (t) => t.replace(/[\r\n\\]/g, '').trim();
        const fmtMoneda = (str) => {
            if (!str || str === "---") return "---";
            const num = parseFloat(str.replace(/[^\d.-]/g, ''));
            return isNaN(num) ? str : new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(num);
        };

        // ── LECTOR PDF ─────────────────────────────────────────────────────
        document.getElementById('pdfInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            try {
                const pdf = await pdfjs.getDocument({ data: await file.arrayBuffer() }).promise;
                let tokens = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const text = await page.getTextContent();
                    text.items.forEach(item => { const c = limpiar(item.str); if (c) tokens.push(c); });
                }
                procesarOC(tokens);
            } catch (err) {
                mostrarModal("Error", "Error al procesar PDF: " + err.message);
            }
        });

        // ── EXTRACCIÓN OC ──────────────────────────────────────────────────
        function procesarOC(arr) {
            const findValue = (label) => {
                const idx = arr.findIndex(t => t.toLowerCase().includes(label.toLowerCase()));
                return idx !== -1 ? arr[idx + 1] : "---";
            };
            let provIdx = arr.findIndex(t => t.toLowerCase().includes("nombre / razon"));
            let proveedor = (provIdx !== -1) ? (arr[provIdx + 1].includes("Social") ? arr[provIdx + 2] : arr[provIdx + 1]) : "---";
            const nit = arr.find(t => /^\d{8,11}-\d$/.test(t)) || "---";
            const oc = findValue("COSECUTIVO No");
            const ccIdx = arr.findIndex(t => t.toLowerCase().includes("c. costo"));
            const cCosto = ccIdx !== -1 ? arr[ccIdx + 1] : "---";
            let fechaSol = "---";
            ["fecha solicitud", "revisión n°", "revision n°"].forEach(lbl => {
                const idx = arr.findIndex(t => t.toLowerCase().includes(lbl));
                if (idx !== -1 && fechaSol === "---") {
                    for (let k = 1; k <= 5; k++) {
                        if (arr[idx+k] && /\d+ de [a-zA-Z]+ \d+/.test(arr[idx+k])) { fechaSol = arr[idx+k]; break; }
                    }
                }
            });
            const findDinero = (label) => {
                for (let i = arr.length - 1; i >= 0; i--) {
                    if (arr[i].toLowerCase().includes(label.toLowerCase())) {
                        for (let k = 1; k <= 6; k++) {
                            if (arr[i+k] && (arr[i+k].includes('$') || /^[\d,.]+$/.test(arr[i+k]) && arr[i+k].length > 4)) return arr[i+k];
                        }
                    }
                }
                return "---";
            };
            const vBase = findDinero("subtotal") !== "---" ? findDinero("subtotal") : findDinero("base");
            const vIva = findDinero("iva");
            const vTotal = findDinero("valor total") !== "---" ? findDinero("valor total") : findDinero("total");
            dataExtraida = { proveedor, nit, oc, cCosto, fechaSol, vBase, vIva, vTotal };
            renderTodo(dataExtraida, arr);
        }

        // ── RENDER UI ──────────────────────────────────────────────────────
        function renderTodo(data, arr) {
            document.getElementById("panelIzquierdo").innerHTML = `
                <div class="data-row">
                    <div class="label">Proveedor</div>
                    <div class="value">${data.proveedor}</div>
                </div>
                <div class="data-row">
                    <div class="label">NIT</div>
                    <div class="value">${data.nit}</div>
                </div>
                <div class="data-row">
                    <div class="label">OC No.</div>
                    <div class="value-large">${data.oc}</div>
                </div>
                <div class="data-row">
                    <div class="label">Centro Costo</div>
                    <div class="value">${data.cCosto}</div>
                </div>
                <div class="data-row">
                    <div class="label">Fecha Solicitud</div>
                    <div class="value">${data.fechaSol}</div>
                </div>
            `;

            let items = [];
            for (let i = 0; i < arr.length; i++) {
                if (/^\d+$/.test(arr[i]) && arr[i+1] && arr[i+2] && parseFloat(arr[i+2].replace(/[^\d.-]/g, '')) > 0) {
                    items.push({
                        codigo: arr[i],
                        descripcion: arr[i+1].substring(0, 30),
                        cantidad: arr[i+2] || "1",
                        unidad: arr[i+3] || "Und",
                        unitario: fmtMoneda(arr[i+4] || "0"),
                        parcial: fmtMoneda(arr[i+5] || "0")
                    });
                    i += 5;
                }
            }
            
            if (items.length === 0) {
                items = [{ codigo: "---", descripcion: "Sin items", cantidad: "---", unidad: "---", unitario: "---", parcial: "---" }];
            }

            let materialesHTML = items.map(item => `
                <div class="table-row">
                    <div class="table-cell"><strong>${item.codigo}</strong></div>
                    <div class="table-cell">${item.descripcion}</div>
                    <div class="table-cell">${item.cantidad}</div>
                    <div class="table-cell">${item.unidad}</div>
                    <div class="table-cell">${item.unitario}</div>
                    <div class="table-cell"><strong>${item.parcial}</strong></div>
                </div>
            `).join('');
            document.getElementById("panelMateriales").innerHTML = materialesHTML;

            document.getElementById("panelTotales").innerHTML = `
                <div class="data-row">
                    <div class="label">Subtotal</div>
                    <div class="value">${fmtMoneda(data.vBase)}</div>
                </div>
                <div class="data-row">
                    <div class="label">IVA (19%)</div>
                    <div class="value">${fmtMoneda(data.vIva)}</div>
                </div>
                <div class="data-row">
                    <div class="label">Total OC</div>
                    <div class="value-large">${fmtMoneda(data.vTotal)}</div>
                </div>
                <div class="data-row">
                    <div class="label">Estado</div>
                    <div class="status">Pendiente Aprobación</div>
                </div>
            `;

            document.getElementById("seccionAcciones").style.display = "block";
            document.getElementById("sesionIndicador").style.display = "block";
        }

        // ── AUTENTICACIÓN CON OAUTH - AUTHORIZATION CODE FLOW ───────────────
        async function obtenerToken() {
            return new Promise((resolve, reject) => {
                // Generar state para seguridad
                const state = Math.random().toString(36).substring(7);
                sessionStorage.setItem('oauth_state', state);
                
                // URL de autenticación con TENANT ESPECÍFICO - AUTHORIZATION CODE FLOW
                const authUrl = `https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/authorize?` +
                    `client_id=${CLIENT_ID}&` +
                    `response_type=code&` +
                    `scope=${encodeURIComponent('offline_access https://graph.microsoft.com/.default')}&` +
                    `redirect_uri=${encodeURIComponent(window.location.href.split('#')[0])}&` +
                    `state=${state}&` +
                    `prompt=select_account`;
                
                console.log("🔐 Abriendo login con Authorization Code Flow...");
                
                // Abrir popup de login
                const popup = window.open(authUrl, "login", "width=500,height=600");
                
                if (!popup) {
                    reject(new Error("Popup bloqueado. Por favor, habilita popups en tu navegador."));
                    return;
                }

                // Escuchar mensaje del popup
                const handleMessage = (event) => {
                    if (event.origin !== window.location.origin) return;
                    
                    if (event.data.access_token) {
                        accessToken = event.data.access_token;
                        window.removeEventListener('message', handleMessage);
                        popup.close();
                        resolve(accessToken);
                    } else if (event.data.error) {
                        window.removeEventListener('message', handleMessage);
                        popup.close();
                        reject(new Error(event.data.error));
                    }
                };

                window.addEventListener('message', handleMessage);

                // Escuchar cambios en la URL del popup
                const checkUrl = setInterval(() => {
                    try {
                        if (popup.closed) {
                            clearInterval(checkUrl);
                            window.removeEventListener('message', handleMessage);
                            reject(new Error("Popup cerrado por el usuario"));
                            return;
                        }
                        
                        const popupUrl = popup.location.href;
                        if (popupUrl.includes('code=')) {
                            clearInterval(checkUrl);
                            const url = new URL(popupUrl);
                            const code = url.searchParams.get('code');
                            const returnedState = url.searchParams.get('state');
                            const storedState = sessionStorage.getItem('oauth_state');
                            
                            if (returnedState !== storedState) {
                                popup.close();
                                reject(new Error("State validation failed"));
                                return;
                            }
                            
                            popup.close();
                            // El token será enviado por postMessage
                        }
                    } catch (e) {
                        // Ignorar errores de CORS al intentar leer la URL del popup
                    }
                }, 500);

                // Timeout
                setTimeout(() => {
                    clearInterval(checkUrl);
                    window.removeEventListener('message', handleMessage);
                    if (popup && !popup.closed) popup.close();
                    reject(new Error("Timeout en autenticación"));
                }, 120000);
            });
        }

        // ── ENVÍO ──────────────────────────────────────────────────────────
        async function enviarAprobacion() {
            if (!dataExtraida) { mostrarModal("Error", "Carga un PDF primero"); return; }
            await enviarAExcel("Operaciones");
        }

        async function enviarFinanzas() {
            if (!dataExtraida) { mostrarModal("Error", "Carga un PDF primero"); return; }
            await enviarAExcel("Finanzas");
        }

        async function enviarAExcel(destino) {
            const estadoEl = document.getElementById("estadoEnvio");
            const botonesEl = document.getElementById("seccionAcciones");
            
            estadoEl.style.display = "block";
            estadoEl.style.background = "#1e40af";
            estadoEl.style.color = "white";
            estadoEl.innerHTML = "⏳ Obteniendo autenticación...";
            botonesEl.style.opacity = "0.5";
            botonesEl.style.pointerEvents = "none";

            try {
                // Obtener token
                if (!accessToken) {
                    estadoEl.innerHTML = "⏳ Abriendo login de Microsoft...";
                    accessToken = await obtenerToken();
                }

                estadoEl.innerHTML = "⏳ Procesando...";

                const siteUrl = `https://${SP_HOSTNAME}${SP_SITE_PATH}`;

                // Obtener ID del sitio
                const siteResp = await fetch(`https://graph.microsoft.com/v1.0/sites/root:${SP_SITE_PATH}`, {
                    headers: { Authorization: `Bearer ${accessToken}` }
                });
                if (!siteResp.ok) throw new Error("Sitio no encontrado");
                const siteData = await siteResp.json();
                const siteId = siteData.id;

                // Obtener ID del archivo
                const fileResp = await fetch(
                    `https://graph.microsoft.com/v1.0/sites/${siteId}/drive/root:${EXCEL_PATH}`,
                    { headers: { Authorization: `Bearer ${accessToken}` } }
                );
                if (!fileResp.ok) throw new Error("Archivo no encontrado");
                const fileData = await fileResp.json();
                const fileId = fileData.id;

                // Obtener ID de la tabla
                const tableResp = await fetch(
                    `https://graph.microsoft.com/v1.0/me/drive/items/${fileId}/workbook/tables/${EXCEL_TABLE}`,
                    { headers: { Authorization: `Bearer ${accessToken}` } }
                );
                if (!tableResp.ok) throw new Error("Tabla no encontrada");

                // Agregar fila
                const nuevaFila = {
                    values: [[
                        dataExtraida.oc,
                        dataExtraida.proveedor,
                        dataExtraida.nit,
                        dataExtraida.cCosto,
                        dataExtraida.fechaSol,
                        dataExtraida.vBase,
                        dataExtraida.vIva,
                        dataExtraida.vTotal,
                        destino,
                        new Date().toLocaleDateString('es-CO'),
                        "Usuario"
                    ]]
                };

                const addResp = await fetch(
                    `https://graph.microsoft.com/v1.0/me/drive/items/${fileId}/workbook/tables/${EXCEL_TABLE}/rows/add`,
                    {
                        method: "POST",
                        headers: {
                            Authorization: `Bearer ${accessToken}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(nuevaFila)
                    }
                );

                if (!addResp.ok) throw new Error("Error al registrar");

                estadoEl.style.background = "#16a34a";
                estadoEl.innerHTML = "✅ Registrado en Excel - " + destino;

                mostrarModal("✅ Éxito", `La aprobación se registró en Excel\n\nDestino: ${destino}\nOC: ${dataExtraida.oc}`);

            } catch (error) {
                console.error("Error:", error);
                estadoEl.style.background = "#dc2626";
                estadoEl.innerHTML = "❌ Error: " + error.message;
                mostrarModal("❌ Error", "No se pudo registrar: " + error.message);
            } finally {
                botonesEl.style.opacity = "1";
                botonesEl.style.pointerEvents = "auto";
            }
        }

        console.log("✅ RINOL v17 LISTO - Usa tu Tenant ID específico");
        console.log("📍 Tenant ID:", TENANT_ID);
    </script>
</body>
</html>
